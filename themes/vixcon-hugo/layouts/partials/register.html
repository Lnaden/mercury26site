{{ $data := index .Site.Data .Site.Language.Lang }}

{{ with $data.register.pricing }}
<section class="section section-pricing" id="register">
  <div class="container">
  {{range .headers }}
      <div class="row">
        <div class="col-lg-6">
          <div class="heading mb-5">
            <span class="stroke-text">{{ .title_outline }}</span>
            <div class="pl-90">
              <h2 class="text-white mt-3">{{ .title | markdownify }}</h2>
              <p class="text-white-50">{{ .content | markdownify }}</p>
            </div>
          </div>
        </div>
      </div>
    {{ end}}
    {{ partial "register-table.html" (slice .pricing_table .abstract_table)}}

  </div>
</section>
{{ end }}
