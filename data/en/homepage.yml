############################## Event ##############################
event:
  enable : true
  title_outline : "event"
  title : "Collaborating to Improve Undergrad Research in Computational Chemistry"
  image_back : "images/places/burruss-hall.png"
  image_front : "images/groups/vt_logo_vert.png"
  content: "The 2026 annual MERCURY Conference for undergraduate computational
            chemistry will be held the week of July 20, 2026. [MERCURY](http://www.mercuryconsortium.org/) is delighted to have
            Prof. Daniel Crawford and the 
            [Molecular Sciences Software Institute](https://molssi.org/) host the
            conference on the Virginia Tech campus in Blacksburg, VA.


            The conference includes six outstanding [plenary speakers](#speakers), an undergraduate poster
            session, and evening social and networking events. The conference is an excellent
            forum for undergraduates to present their work and to learn from experts in the
            field, allowing them to put their own research into perspective. It is equally
            valuable as a networking event for faculty working with undergraduates.
            Undergraduates from all types of institutions are invited to come present their
            work."
  # content : "The 2026 conference will be hosted by Daniel Crawford and MolSSI at Virginia Tech July 22-24. 
  #            The conference is an excellent forum for undergraduates to present their work and to learn from experts in the field, allowing them to put their own research into perspective. 
  #            It is equally valuable as a networking event for faculty working with undergraduates. Undergraduates from all types of institutions are invited to come present their work. 
  #            We have an amazing group of speakers lined up."
  button:
    enable : true
    label : "How to Get Here"
    link : "travel"

######################### Call to action #########################
cta:  # Abused to have about the mercury group here
  enable : true
  subtitle : ""
  title : "About the MERCURY Consortium"
  image : "images/logo.png"
  content: "The consortium, known as the Molecular Education and Research Consortium in
            Undergraduate computational chemistry (MERCURY) was founded in 2001 with the
            goal of establishing research collaboration among seven computational chemistry
            faculty from primarily undergraduate institutions (PUIs). The consortium members
            share NSF-funded computational facilities and meet at an annual MERCURY
            conference to network and present their research."
  button:
    enable : false 
    label : "Register Now"
    link : "register"

