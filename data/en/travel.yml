################## about #################################
about:
  enable : true
  image : "images/banner/aerial-campus.jpg"
  title : "Virginia Polytechnic Institute (**Virginia Tech**)"
  content : |
    VT is located in the heart of lovely Blacksburg, Virginia, USA. Use the information on this page to plan your trip.

    The conference will take place at [Goodwin Hall](https://www.vt.edu/about/locations/buildings/signature-engineering.html), which is on the VT campus.
