################## Staging ##############################
travel:
  enable : 
    - flight
    - public_transportation
    - drive
    - hotel
    - campus

  flight:
    subtitle : "Blacksburg is about 1 hour from Roanoke, 4 hours from Washington D.C., and 3 hours from Charlotte, NC."
    title : "**Flying** In"
    icon : "tf-ion-plane"
    button:
      enable : false
      label : "Get ticket"
      link : "pricing"
    content: "Roanoke-Blacksburg Regional Airport (ROA) is the closest airport to Blacksburg, and is served by American Airlines, Delta, and United. The airport is about 40-60 minutes from campus. Other nearby airports include Washington Dulles International Airport (IAD), Washington National Airport (DCA), Charlotte Douglas International Airport (CLT), and Raleigh-Durham International Airport (RDU)."
    
    map: 
      enable : true
      embed_map_id : "mid=17rJ7ql8FwW75gVEeNZx118SreTsDC8M&ehbc=2E312F&noprof=1"
      caption : "Map of nearby airports and their distance to Blacksburg, VA"

  public_transportation:
    subtitle : "If flying into Roanoke, there is a public bus that goes to Blacksburg."
    title : "Bus from ROA to **Campus**"
    icon : "tf-ion-android-bus"
    content: | 
      There is a bus service that runs from the Roanoke airport (ROA) regularly. It is operated by [Valley Metro's Smart Way](https://www.valleymetro.com/services/smart-way-services) service. No advance ticket is 
      required and you can pay when boarding the bus; it costs $1.75 for a one way ticket and is **CASH ONLY** when paid on the bus itself, with exact change needed. The same service can be used to return to the airpot from the Transit Hub.

      The Smart Way bus will drop you off on campus at the [VT Transit Center](https://www.facilities.vt.edu/design-construction/capital-construction/campus-construction-projects/multi-modal-transit-facility.html) 
      in the heart of campus. From there, you can ride any number of [Blacksburg Transit (BT)](/travel/#city-and-campus-busses) busses to get around campus and Blacksburg more broadly.

    image:
      image_path : "images/places/map_to_goodwin.png"
      url: ""
      caption : ""



  drive:
    subtitle : |
      You will likely have some drive time no matter where you come from.

      <u>If you are driving to the conference and you will need parking on campus, please indicate that on your registration form.</u>
    title : "**Driving** In"
    icon : "tf-ion-android-car"
    button:
      enable : false
      label : "Get ticket"
      link : "pricing"
    content: | 
      Some basic information on driving to Blacksburg:

      #### Coming From the West/Southwest
        * Take I-81 North until you get to US-460 West, then take US-460 West into Blacksburg
        * "Black" Arrows into "Orange" on the map 
      
      #### Coming from the South
        * Take I-77 North until you get to I-81 North
        * Follow instructions for West/Southwest above.
        * "Black" Arrows into "Orange" on the map
      
      #### Coming from the East and Northeast
        * Take I-81 West until you get to US-460 West, then take US-460 West into Blacksburg
        * "Purple" Arrow into "Orange" on the map
      
      #### Coming from the North/Northwest
        * Take I-77 South until you get to US-460 East, then take US-460 East into Blacksburg
        * "Green" Arrow on the map
      
    
    map: 
      enable : true
      embed_map_id : "mid=1kiFlXPJV52PXMzBGG-62zTzEgEEwkvw&ehbc=2E312F&noprof=1"
      caption : "In general: I-81 until you get to US-460, then take US-460 until you get to Blacksburg. The exact directions depend on where you're coming from, but the map below gives a general idea of the routes to take from nearby cities."

  hotel:
    subtitle : "The Closest Hotel to the event is either the Hyatt Place or the Residence Inn, however, both Blacksburg and Christiansburg hotels will both have you near campus."
    title : "**Hotels**"
    icon : "tf-ion-ios-cloudy-night"
    content: | 
      Some hotels in Blacksburg to consider:

      * (Hyatt Place)[https://www.hyatt.com/en-US/hotel/virginia/hyatt-place-blacksburg-university/cltzb]
      * (Residence Inn by Marriott Blacksburg-University)[https://www.marriott.com/en-us/hotels/roarb-residence-inn-blacksburg-university/overview/]
      * (The Inn at Virginia Tech)[https://be.synxis.com/?Hotel=32532&Chain=5388&rate=HOKIE]
      * (Holiday Inn Express)[https://www.ihg.com/holidayinnexpress/hotels/us/en/blacksburg/bcbbg/hoteldetail]

    map:
      enable : true
      embed_map_id : "mid=16iFNwbTqBZRDwrORh4YksgaOABc7mGs&ehbc=2E312F&noprof=1"
      caption : "Each of the pinned hotels on the map has a link to their booking page in the description."

  campus:
    subtitle : "VT Provides a regular bus service all around Blacksburg and Campus."
    title : "City and **Campus** Busses"
    icon : "tf-ion-android-bus"
    content: | 
      The Blacksburg Transit (BT) bus system provides regular service around Blacksburg and to the VT campus. The bus system is free to use for everyone, and is a convenient way to get around town and to campus. 
      For those staying in hotels in Blacksburg, the bus system provides regular service to and from campus. For those staying in hotels in Christiansburg, the bus system provides regular service to and from campus, 
      but the schedule is less frequent than for hotels in Blacksburg.

      For those driving, there are several parking options available on campus, including parking garages and surface lots. We recommend using the parking garage closest to the event venue for convenience.

      TODO: Determine where the event is at to see if parking is an option.

    image:
      image_path : "images/groups/BTlogoRGB.png"
      url: "https://ridebt.org/"
      caption : ""
