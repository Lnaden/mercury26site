################################# Pricing ##########################
pricing:
  enable : true
  headers:
    -   title_outline : "Register"
        title : "Sign up to attend the conference!"
        content : "Registration fees include on-campus housing in a dormitory (maybe put a link to the specific dorm if available) and meals during the conference.
                  Note that conference attendees **staying in the dorms will need to bring their own linens, towels, and all other needed toiletry items.**"
    -   title_outline : "Deadlines"
        title : "Conference and Workshop Registration Deadline: TODO:TBD<br>


                Abstract Submission for Poster Deadline: TODO:TBD
                "
        content : "Students who wish to present a poster during the poster session at the conference should submit their abstract at the link below.  
                   The abstract is limited to 150 words and one graphic.  The graphic you upload will be shown during your flash talk.  
                   If you need help preparing your abstract, please consult 
                   [the American Chemical Society abstract writing tips](https://www.acs.org/meetings/acs-meetings/spring/presenters/undergraduate-abstract.html) 
                   or talk to your research advisor."
  pricing_table:
    # pricing table loop
    - title : "Undergraduate Student<br> Double Occupancy"
      style : "1"
      price : "$150 USD"
      image : "images/icons/two-beds-60px.png"
      bg_image : "images/bg/page-header.jpg"
      services:
        - "Occupancy accommodation with another attendee."
        - Shared room at on-campus [Goodwin Hall](https://www.vt.edu/about/locations/buildings/signature-engineering.html)
        - "Meals during the conference."
        - "Optional access to the MolSSI workshop."
        - "If staying in Goodwin:<br> **MUST bring their own linens (twin bed), towels, and all other needed toiletry items.**"
      button:
        label : "Register Now"
        link : "#"

    - title : "Undergraduate Student <br> Single Occupancy"
      style : "1"
      price : "$200 USD"
      image : "images/icons/single-bed-60px.png"
      bg_image : "images/bg/page-header.jpg"
      services:
        - "Single occupancy accommodation."
        - Room at on-campus [Goodwin Hall](https://www.vt.edu/about/locations/buildings/signature-engineering.html)
        - "Meals during the conference."
        - "Optional access to the MolSSI workshop."
        - "If staying in Goodwin:<br> **MUST bring their own linens (twin bed), towels, and all other needed toiletry items.**"
      button:
        label : "Register Now"
        link : "#"

    - title : "Grad Students<br>Post-Docs<br>Faculty"
      style : "1"
      price : "$350 USD"
      image : "images/icons/hotel-to-vt.png"
      bg_image : "images/bg/page-header.jpg"
      services:
        - "Attendees will need to make their own lodging arrangements."
        - "[See Recommended Lodging](/travel/#hotels)"
        - "Meals during the conference."
        - "Optional access to the MolSSI workshop."
      button:
        label : "Register Now"
        link : "#"
  
  abstract_table:  
    - title : ""
      style : "3"
      price : "Submit Abstract for Poster"
      image : "images/icons/poster-60px.png"
      bg_image : "images/bg/page-header.jpg"
      services:
        - "**YOU MUST STILL REGISTER TO ATTEND!**"
        - "The abstract is limited to 150 words and one graphic."
        - "The graphic you upload will be shown during your flash talk."
        - "For help writting, please consult [the American Chemical Society abstract writing tips](https://www.acs.org/meetings/acs-meetings/spring/presenters/undergraduate-abstract.html) or talk to your research advisor."
      button:
        label : "Submit Abstract"
        link : "#"

        
